name: PR Preview Infrastructure

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]

jobs:
  prerequisites:
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - name: Check Railway authentication
        run: railway whoami

  changes:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  preview-frontend:
    needs: prerequisites
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.vercel.outputs.frontend_url }}
      frontend_origin: ${{ steps.vercel.outputs.frontend_origin }}
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Fetch Vercel preview URL
        id: vercel
        run: |
          api="https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=preview&state=READY&meta-githubCommitSha=$COMMIT_SHA"

          response=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "$api")

          frontend_url=$(node -e "const data=JSON.parse(process.argv[1]||'{}'); const dep=(data.deployments||[])[0]; console.log(dep && dep.url ? 'https://'+dep.url : '');" "$response")
          frontend_origin=$(node -e "const u=process.argv[1]; if(!u){console.log(''); process.exit(0);} const {URL}=require('url'); console.log(new URL(u).origin);" "$frontend_url")

          echo "frontend_url=$frontend_url" >> "$GITHUB_OUTPUT"
          echo "frontend_origin=$frontend_origin" >> "$GITHUB_OUTPUT"

  preview-db:
    needs: prerequisites
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      db_name: ${{ steps.db.outputs.name }}
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.PR_DB_USER }}
      DB_PASSWORD: ${{ secrets.PR_DB_PASSWORD }}
      DB_NAME: library_pr_${{ github.event.pull_request.number }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Create and seed PR database
        env:
          MYSQL_PWD: ${{ secrets.PR_DB_PASSWORD }}
        run: |
          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" \
            -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\`;"

          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" "$DB_NAME" < database/library_schema.sql
          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" "$DB_NAME" < database/library_sample_data.sql

      - name: Store DB name output
        id: db
        run: echo "name=$DB_NAME" >> "$GITHUB_OUTPUT"

  preview-db-teardown:
    if: >-
      github.event.action == 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.PR_DB_USER }}
      DB_PASSWORD: ${{ secrets.PR_DB_PASSWORD }}
      DB_NAME: library_pr_${{ github.event.pull_request.number }}
    steps:
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Drop PR database
        env:
          MYSQL_PWD: ${{ secrets.PR_DB_PASSWORD }}
        run: |
          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" \
            -e "DROP DATABASE IF EXISTS \`$DB_NAME\`;"

  preview-backend:
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      needs.changes.outputs.backend == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: [changes, preview-db, preview-frontend]
    outputs:
      backend_url: ${{ steps.railway_url.outputs.url }}
    permissions:
      contents: read
      pull-requests: write
    env:
      # RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.PR_DB_USER }}
      DB_PASSWORD: ${{ secrets.PR_DB_PASSWORD }}
      DB_NAME: library_pr_${{ github.event.pull_request.number }}
      PREVIEW_ENV: pr-${{ github.event.pull_request.number }}
      ALLOWED_ORIGINS: ${{ needs.preview-frontend.outputs.frontend_origin }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Configure Railway preview environment variables
        working-directory: backend
        run: |
          railway variables set -e "$PREVIEW_ENV" --service "$RAILWAY_SERVICE_ID" \
            DB_HOST="$DB_HOST" \
            DB_PORT="$DB_PORT" \
            DB_USER="$DB_USER" \
            DB_PASSWORD="$DB_PASSWORD" \
            DB_NAME="$DB_NAME" \
            ALLOWED_ORIGINS="$ALLOWED_ORIGINS"

      - name: Deploy backend to Railway preview environment
        working-directory: backend
        run: railway up -e "$PREVIEW_ENV" --service "$RAILWAY_SERVICE_ID"

      - name: Extract Railway preview URL
        id: railway_url
        run: |
          railway status --json -e "$PREVIEW_ENV" --service "$RAILWAY_SERVICE_ID" | node -e "const fs=require('fs'); const text=fs.readFileSync(0,'utf8'); const urls=(text.match(/https?:\/\/[^\s\"']+/g)||[]); const railway=urls.find((u)=>u.includes('railway.app'))||urls[0]||''; console.log('url='+railway);" >> "$GITHUB_OUTPUT"

  preview-backend-teardown:
    if: >-
      github.event.action == 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      PREVIEW_ENV: pr-${{ github.event.pull_request.number }}
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Delete Railway preview environment
        run: railway environment delete "$PREVIEW_ENV" --project "$RAILWAY_PROJECT_ID"

  preview-summary:
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: [preview-db, preview-frontend, preview-backend]
    permissions:
      pull-requests: write
    env:
      FRONTEND_URL: ${{ needs.preview-frontend.outputs.frontend_url }}
      BACKEND_URL: ${{ needs.preview-backend.outputs.backend_url }}
      DB_NAME: ${{ needs.preview-db.outputs.db_name }}
    steps:
      - name: Comment preview links on PR
        uses: actions/github-script@v7
        with:
          script: |
            const frontend = process.env.FRONTEND_URL || 'Unavailable'
            const backend = process.env.BACKEND_URL || 'Unavailable'
            const dbName = process.env.DB_NAME || 'Unavailable'
            const body = [
              'Generated preview links:',
              `- Frontend: ${frontend}`,
              `- Backend: ${backend}`,
              `- Database: ${dbName}`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
