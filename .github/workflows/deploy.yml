name: PR Preview Infrastructure

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]

jobs:
  preview-db:
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: library_pr_${{ github.event.pull_request.number }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Create and seed PR database
        env:
          MYSQL_PWD: ${{ secrets.PR_DB_PASSWORD }}
        run: |
          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" \
            -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\`;"

          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" "$DB_NAME" < database/library_schema.sql
          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" "$DB_NAME" < database/library_sample_data.sql

      - name: Comment DB name on PR
        uses: actions/github-script@v7
        with:
          script: |
            const dbName = process.env.DB_NAME
            const body = `PR preview database ready: ${dbName}`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })

  preview-db-teardown:
    if: >-
      github.event.action == 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: library_pr_${{ github.event.pull_request.number }}
    steps:
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Drop PR database
        env:
          MYSQL_PWD: ${{ secrets.DB_PASSWORD }}
        run: |
          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" \
            -e "DROP DATABASE IF EXISTS \`$DB_NAME\`;"
