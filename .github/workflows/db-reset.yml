name: Reset Database

on:
  push:
    branches: [main, master]
    paths:
      - "database/**"
  workflow_dispatch:

jobs:
  reset-database:
    runs-on: ubuntu-latest
    env:
      SAMPLE_DATA_TIMEZONE: America/Chicago
      DB_TIME_ZONE: "+00:00"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create database env file
        run: |
          mkdir -p database
          cat <<'EOF' > database/.env
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.PR_DB_USER }}
          DB_PASSWORD=${{ secrets.PR_DB_PASSWORD }}
          DB_NAME=librarydatabase
          SEED_STAFF_PASSWORD=${{ secrets.SEED_STAFF_PASSWORD }}
          SEED_USER_PASSWORD=${{ secrets.SEED_USER_PASSWORD }}
          EOF

      - name: Reset database
        run: npm run db:reset
