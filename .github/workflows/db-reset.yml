name: Reset Database

on:
  workflow_dispatch:

jobs:
  reset-database:
    runs-on: ubuntu-latest
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      PR_DB_USER: ${{ secrets.PR_DB_USER }}
      PR_DB_PASSWORD: ${{ secrets.PR_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create database env file
        run: |
          mkdir -p database
          cat <<'EOF' > database/.env
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.PR_DB_USER }}
          DB_PASSWORD=${{ secrets.PR_DB_PASSWORD }}
          DB_NAME=librarydatabase
          EOF

      - name: Update sample dates
        run: npm run db:update-dates

      - name: Reset database
        run: npm run db:reset
